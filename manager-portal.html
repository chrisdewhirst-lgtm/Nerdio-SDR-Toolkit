<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nerdio Manager Portal v3</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #042838;
            color: #FFFFFF;
            min-height: 100vh;
        }

        .header-bar {
            height: 52px;
            background-color: #042838;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            font-weight: 600;
        }

        .v3-badge {
            background-color: #1E9DB8;
            color: #042838;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 700;
            margin-left: 8px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .header-right a, .header-right button {
            color: #1E9DB8;
            text-decoration: none;
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: color 0.3s;
        }

        .header-right a:hover, .header-right button:hover {
            color: #CDFF4E;
        }

        .logout-btn {
            color: #A795C7;
        }

        .logout-btn:hover {
            color: #CDFF4E;
        }

        .main-content {
            padding: 24px;
            max-width: 100%;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #FFFFFF;
        }

        .team-overview {
            margin-bottom: 40px;
        }

        .team-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }

        .team-card {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .team-card:hover {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .team-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .team-card-name {
            font-size: 16px;
            font-weight: 600;
        }

        .team-card-role {
            font-size: 12px;
            color: #A795C7;
            background-color: rgba(167, 149, 199, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .team-card-stat {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
        }

        .team-card-stat-value {
            color: #1E9DB8;
            font-weight: 600;
        }

        .summary-bar {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 16px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .summary-item {
            text-align: center;
        }

        .summary-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .summary-value {
            font-size: 28px;
            font-weight: 700;
            color: #1E9DB8;
        }

        .view-as-section {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .view-as-dropdown {
            padding: 8px 12px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #FFFFFF;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            cursor: pointer;
            min-width: 200px;
        }

        .view-as-button {
            padding: 8px 16px;
            background-color: #1E9DB8;
            border: none;
            border-radius: 8px;
            color: #042838;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .view-as-button:hover {
            background-color: #CDFF4E;
        }

        .view-as-indicator {
            margin-left: auto;
            padding: 8px 12px;
            background-color: rgba(205, 255, 78, 0.1);
            border: 1px solid rgba(205, 255, 78, 0.3);
            border-radius: 8px;
            color: #CDFF4E;
            font-size: 12px;
        }

        .pipeline-dashboard {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-bottom: 40px;
        }

        .pipeline-column {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 20px;
        }

        .column-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #FFFFFF;
        }

        .pipeline-stage {
            margin-bottom: 16px;
        }

        .stage-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .stage-name {
            color: rgba(255, 255, 255, 0.7);
            font-weight: 500;
        }

        .stage-count {
            color: #1E9DB8;
            font-weight: 600;
        }

        .stage-arr {
            color: #CDFF4E;
            font-size: 11px;
        }

        .stage-bar {
            height: 24px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .stage-bar:hover {
            background-color: rgba(255, 255, 255, 0.08);
        }

        .stage-fill {
            height: 100%;
            transition: width 0.3s;
        }

        .prospect { background-color: rgba(205, 255, 78, 0.4); }
        .qualified { background-color: rgba(30, 157, 184, 0.4); }
        .discovery { background-color: rgba(167, 149, 199, 0.4); }
        .proposal { background-color: rgba(255, 193, 7, 0.4); }
        .negotiation { background-color: rgba(255, 152, 0, 0.4); }
        .closed-won { background-color: rgba(76, 175, 80, 0.4); }
        .closed-lost { background-color: rgba(244, 67, 54, 0.4); }

        .activity-entry {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 12px;
            margin-bottom: 0;
        }

        .activity-entry:last-child {
            border-bottom: none;
        }

        .activity-timestamp {
            color: rgba(255, 255, 255, 0.5);
            font-size: 11px;
            margin-bottom: 4px;
        }

        .activity-user {
            color: #1E9DB8;
            font-weight: 600;
        }

        .activity-account {
            color: #CDFF4E;
        }

        .activity-type {
            color: #A795C7;
            margin: 0 4px;
        }

        .activity-note {
            color: rgba(255, 255, 255, 0.6);
            margin-top: 4px;
            font-size: 11px;
        }

        .filter-control {
            margin-bottom: 12px;
        }

        .filter-control select {
            width: 100%;
            padding: 6px 8px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: #FFFFFF;
            font-family: 'Poppins', sans-serif;
            font-size: 12px;
        }

        .alerts-section {
            margin-bottom: 20px;
        }

        .alert-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            border-left: 4px solid;
            font-size: 12px;
            background-color: rgba(255, 255, 255, 0.02);
        }

        .alert-critical {
            border-left-color: #FF5252;
        }

        .alert-warning {
            border-left-color: #FFB300;
        }

        .alert-info {
            border-left-color: #1E9DB8;
        }

        .alert-title {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .alert-message {
            color: rgba(255, 255, 255, 0.7);
        }

        .territory-heatmap {
            margin-bottom: 40px;
        }

        .heatmap-controls {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            align-items: center;
        }

        .search-bar {
            flex: 1;
            padding: 10px 12px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #FFFFFF;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
        }

        .search-bar::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .export-btn {
            padding: 10px 16px;
            background-color: #A795C7;
            border: none;
            border-radius: 8px;
            color: #FFFFFF;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .export-btn:hover {
            background-color: #CDFF4E;
            color: #042838;
        }

        .heatmap-table {
            width: 100%;
            border-collapse: collapse;
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            overflow: hidden;
        }

        .heatmap-table thead {
            background-color: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        }

        .heatmap-table th {
            padding: 12px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }

        .heatmap-table th:hover {
            background-color: rgba(255, 255, 255, 0.08);
        }

        .heatmap-table td {
            padding: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 13px;
        }

        .heatmap-table tbody tr:hover {
            background-color: rgba(255, 255, 255, 0.03);
        }

        .fit-score {
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 600;
            font-size: 12px;
            text-align: center;
            min-width: 40px;
        }

        .fit-excellent {
            background-color: rgba(76, 175, 80, 0.3);
            color: #4CAF50;
        }

        .fit-good {
            background-color: rgba(76, 175, 80, 0.2);
            color: #8BC34A;
        }

        .fit-fair {
            background-color: rgba(255, 193, 7, 0.2);
            color: #FFC107;
        }

        .fit-poor {
            background-color: rgba(244, 67, 54, 0.2);
            color: #F44336;
        }

        .heat-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }

        .heat-hot { background-color: #FF5252; }
        .heat-warm { background-color: #FFB300; }
        .heat-cold { background-color: #1E9DB8; }

        .no-data {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.4);
        }

        @media (max-width: 1600px) {
            .pipeline-dashboard {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 1200px) {
            .pipeline-dashboard {
                grid-template-columns: 1fr;
            }
            .summary-bar {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<script>
var allTeamMembers = [];
var allAccountData = [];
var currentSortColumn = 'account';
var currentSortDirection = 'asc';
var allActivities = [];

function normName(name) {
    return name.toLowerCase().replace(/[^a-z0-9]/g, '');
}

function calculateFitScore(account) {
    var score = 0;
    var breakdown = {
        rds: 0,
        daas: 0,
        intune: 0,
        ea: 0,
        employees: 0,
        engagement: 0
    };

    if (account.rds) {
        var rdsScore = parseInt(account.rds) || 0;
        breakdown.rds = Math.min(rdsScore, 25);
        score += breakdown.rds;
    }

    if (account.daas) {
        var daasScore = parseInt(account.daas) || 0;
        breakdown.daas = Math.min(daasScore, 25);
        score += breakdown.daas;
    }

    if (account.intune) {
        var intuneVal = parseInt(account.intune) || 0;
        breakdown.intune = Math.min(intuneVal, 15);
        score += breakdown.intune;
    }

    if (account.ea) {
        var eaVal = parseInt(account.ea) || 0;
        breakdown.ea = Math.min(eaVal, 15);
        score += breakdown.ea;
    }

    if (account.employees) {
        var empStr = String(account.employees);
        var empVal = 0;
        if (empStr.indexOf('-') > -1) {
            var parts = empStr.split('-');
            var min = parseInt(parts[0]) || 0;
            var max = parseInt(parts[1]) || 0;
            empVal = Math.round((min + max) / 2);
        } else {
            empVal = parseInt(empStr) || 0;
        }
        breakdown.employees = Math.min(Math.round(empVal / 100), 10);
        score += breakdown.employees;
    }

    if (account.engagement) {
        var engVal = parseInt(account.engagement) || 0;
        breakdown.engagement = Math.min(engVal, 10);
        score += breakdown.engagement;
    }

    return {score: Math.min(score, 100), breakdown: breakdown};
}

function init() {
    if (!window._session) return;

    document.getElementById('username-display').textContent = window._session.username;

    if (window._session.role === 'admin') {
        var adminLink = document.getElementById('admin-link-container');
        adminLink.innerHTML = '<a href="admin-panel.html" style="color: #A795C7;">Admin Panel</a>';
    }

    loadTeamData();
    buildViewAsDropdown();
}

function loadTeamData() {
    var usersStr = localStorage.getItem('nerdio_v3_users');
    if (!usersStr) return;

    var users = {};
    try {
        users = JSON.parse(usersStr);
    } catch (e) {
        return;
    }

    allTeamMembers = [];
    allAccountData = [];
    var totalAccounts = 0;
    var totalARR = 0;
    var totalDeals = 0;
    var stageData = {
        'Prospect': {count: 0, arr: 0},
        'Qualified': {count: 0, arr: 0},
        'Discovery': {count: 0, arr: 0},
        'Proposal': {count: 0, arr: 0},
        'Negotiation': {count: 0, arr: 0},
        'Closed Won': {count: 0, arr: 0},
        'Closed Lost': {count: 0, arr: 0}
    };

    for (var username in users) {
        var user = users[username];
        if (user.role !== 'ae' && user.role !== 'sdr') continue;

        var teamMember = {
            username: username,
            name: user.name || username,
            role: user.role,
            accountCount: 0,
            woprCount: 0,
            activeDealsCount: 0,
            totalARR: 0,
            lastActivity: null
        };

        // Load territory
        var terrStr = localStorage.getItem('nerdio_v3_territory_' + username);
        var territory = [];
        try {
            territory = terrStr ? JSON.parse(terrStr) : [];
        } catch (e) {}

        teamMember.accountCount = territory.length;
        totalAccounts += territory.length;

        // Load WOPR
        var woprStr = localStorage.getItem('nerdio_v3_wopr_' + username);
        var wopr = {};
        try {
            wopr = woprStr ? JSON.parse(woprStr) : {};
        } catch (e) {}
        teamMember.woprCount = Object.keys(wopr).length;

        // Load deals
        var dealsStr = localStorage.getItem('nerdio_v3_deals_' + username);
        var deals = {};
        try {
            deals = dealsStr ? JSON.parse(dealsStr) : {};
        } catch (e) {}

        // Load engagements
        var engStr = localStorage.getItem('nerdio_v3_engagements_' + username);
        var engagements = [];
        try {
            engagements = engStr ? JSON.parse(engStr) : [];
        } catch (e) {}

        // Process accounts
        for (var i = 0; i < territory.length; i++) {
            var account = territory[i];
            var normN = normName(account.name || '');
            var deal = deals[normN];
            var fitData = calculateFitScore(account);

            var accountRecord = {
                name: account.name,
                owner: teamMember.name,
                ownerId: username,
                industry: account.industry || 'Unknown',
                fitScore: fitData.score,
                fitBreakdown: fitData.breakdown,
                stage: deal ? (deal.stage || '') : '',
                arr: deal ? (deal.arr || 0) : 0,
                lastActivity: null
            };

            // Find last activity
            for (var j = 0; j < engagements.length; j++) {
                if (normName(engagements[j].account || '') === normN) {
                    if (!accountRecord.lastActivity || engagements[j].timestamp > accountRecord.lastActivity) {
                        accountRecord.lastActivity = engagements[j].timestamp;
                    }
                    allActivities.push({
                        timestamp: engagements[j].timestamp,
                        user: teamMember.name,
                        userId: username,
                        account: engagements[j].account,
                        type: engagements[j].type || 'engagement',
                        note: engagements[j].note || ''
                    });
                }
            }

            allAccountData.push(accountRecord);

            if (deal && deal.stage) {
                teamMember.activeDealsCount++;
                totalDeals++;
                var stageKey = deal.stage;
                if (stageData[stageKey]) {
                    stageData[stageKey].count++;
                    stageData[stageKey].arr += deal.arr || 0;
                }
                teamMember.totalARR += deal.arr || 0;
                totalARR += deal.arr || 0;
            }
        }

        // Last activity timestamp
        if (engagements.length > 0) {
            var latest = engagements[0];
            for (var k = 0; k < engagements.length; k++) {
                if (engagements[k].timestamp > latest.timestamp) {
                    latest = engagements[k];
                }
            }
            teamMember.lastActivity = latest.timestamp;
        }

        allTeamMembers.push(teamMember);
    }

    // Sort activities by timestamp
    allActivities.sort(function(a, b) {
        return new Date(b.timestamp) - new Date(a.timestamp);
    });

    renderTeamCards(allTeamMembers);
    renderSummaryBar(totalAccounts, totalARR, totalDeals);
    renderPipelineStages(stageData);
    renderActivityFeed(allActivities.slice(0, 50));
    renderAlerts();
    renderHeatmap(allAccountData);
}

function renderTeamCards(members) {
    var container = document.getElementById('team-cards');
    container.innerHTML = '';

    for (var i = 0; i < members.length; i++) {
        var member = members[i];
        var card = document.createElement('div');
        card.className = 'team-card';

        var roleLabel = member.role === 'ae' ? 'Account Executive' : 'SDR';
        var lastActStr = member.lastActivity ? new Date(member.lastActivity).toLocaleDateString() : 'Never';

        card.innerHTML =
            '<div class="team-card-header">' +
                '<span class="team-card-name">' + escapeHtml(member.name) + '</span>' +
                '<span class="team-card-role">' + roleLabel + '</span>' +
            '</div>' +
            '<div class="team-card-stat">' +
                '<span>Accounts</span>' +
                '<span class="team-card-stat-value">' + member.accountCount + '</span>' +
            '</div>' +
            '<div class="team-card-stat">' +
                '<span>WOPR Enriched</span>' +
                '<span class="team-card-stat-value">' + member.woprCount + '</span>' +
            '</div>' +
            '<div class="team-card-stat">' +
                '<span>Active Deals</span>' +
                '<span class="team-card-stat-value">' + member.activeDealsCount + '</span>' +
            '</div>' +
            '<div class="team-card-stat">' +
                '<span>Pipeline ARR</span>' +
                '<span class="team-card-stat-value">$' + formatArrDisplay(member.totalARR) + '</span>' +
            '</div>' +
            '<div class="team-card-stat">' +
                '<span>Last Activity</span>' +
                '<span class="team-card-stat-value">' + lastActStr + '</span>' +
            '</div>';

        container.appendChild(card);
    }
}

function renderSummaryBar(total, arr, deals) {
    document.getElementById('total-accounts').textContent = total;
    document.getElementById('total-arr').textContent = '$' + formatArrDisplay(arr);
    document.getElementById('total-deals').textContent = deals;
}

function renderPipelineStages(stageData) {
    var container = document.getElementById('pipeline-stages');
    container.innerHTML = '';

    var stages = ['Prospect', 'Qualified', 'Discovery', 'Proposal', 'Negotiation', 'Closed Won', 'Closed Lost'];
    var maxCount = 0;

    for (var i = 0; i < stages.length; i++) {
        if (stageData[stages[i]].count > maxCount) {
            maxCount = stageData[stages[i]].count;
        }
    }

    for (var i = 0; i < stages.length; i++) {
        var stageName = stages[i];
        var data = stageData[stageName];
        var pct = maxCount > 0 ? (data.count / maxCount) * 100 : 0;

        var stageEl = document.createElement('div');
        stageEl.className = 'pipeline-stage';
        stageEl.onclick = function(n) {
            return function() {
                showStageDetails(n);
            };
        }(stageName);

        var className = stageName.toLowerCase().replace(/\s+/g, '-');

        stageEl.innerHTML =
            '<div class="stage-header">' +
                '<span class="stage-name">' + escapeHtml(stageName) + '</span>' +
                '<span class="stage-count">' + data.count + ' accounts</span>' +
                '<span class="stage-arr">$' + formatArrDisplay(data.arr) + '</span>' +
            '</div>' +
            '<div class="stage-bar">' +
                '<div class="stage-fill ' + className + '" style="width: ' + pct + '%"></div>' +
            '</div>';

        container.appendChild(stageEl);
    }
}

function showStageDetails(stage) {
    var matching = [];
    for (var i = 0; i < allAccountData.length; i++) {
        if (allAccountData[i].stage === stage) {
            matching.push(allAccountData[i]);
        }
    }

    var details = document.getElementById('stage-details');
    if (matching.length === 0) {
        details.innerHTML = '<div class="no-data">No accounts in this stage</div>';
        return;
    }

    var html = '<div style="font-size: 11px; color: rgba(255,255,255,0.7);"><strong>' + escapeHtml(stage) + ':</strong><br>';
    for (var i = 0; i < Math.min(matching.length, 5); i++) {
        html += escapeHtml(matching[i].name) + ' (' + escapeHtml(matching[i].owner) + ')<br>';
    }
    if (matching.length > 5) {
        html += '... and ' + (matching.length - 5) + ' more<br>';
    }
    html += '</div>';
    details.innerHTML = html;
}

function renderActivityFeed(activities) {
    var container = document.getElementById('activity-feed');
    container.innerHTML = '';

    if (activities.length === 0) {
        container.innerHTML = '<div class="no-data">No recent activity</div>';
        return;
    }

    for (var i = 0; i < activities.length; i++) {
        var act = activities[i];
        var dateObj = new Date(act.timestamp);
        var timeStr = dateObj.toLocaleString();

        var entry = document.createElement('div');
        entry.className = 'activity-entry';
        entry.innerHTML =
            '<div class="activity-timestamp">' + timeStr + '</div>' +
            '<span class="activity-user">' + escapeHtml(act.user) + '</span>' +
            '<span class="activity-type">engaged with</span>' +
            '<span class="activity-account">' + escapeHtml(act.account) + '</span>' +
            (act.note ? '<div class="activity-note">"' + escapeHtml(act.note.substring(0, 60)) + (act.note.length > 60 ? '..."' : '"') + '</div>' : '');

        container.appendChild(entry);
    }
}

function filterActivity() {
    var selected = document.getElementById('activity-filter').value;
    var filtered = allActivities.slice(0, 50);

    if (selected) {
        filtered = [];
        for (var i = 0; i < allActivities.length && filtered.length < 50; i++) {
            if (allActivities[i].userId === selected) {
                filtered.push(allActivities[i]);
            }
        }
    }

    renderActivityFeed(filtered);
}

function renderAlerts() {
    var container = document.getElementById('alerts-section');
    container.innerHTML = '';

    var adminAlerts = [];
    try {
        var alertsStr = localStorage.getItem('nerdio_v3_admin_alerts');
        adminAlerts = alertsStr ? JSON.parse(alertsStr) : [];
    } catch (e) {}

    // Stale accounts
    var staleAccounts = [];
    var thirtyDaysAgo = new Date();
    thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);

    for (var i = 0; i < allAccountData.length; i++) {
        var account = allAccountData[i];
        if (!account.lastActivity || new Date(account.lastActivity) < thirtyDaysAgo) {
            staleAccounts.push(account);
        }
    }

    // High-fit unworked
    var highFitUnworked = [];
    for (var i = 0; i < allAccountData.length; i++) {
        var account = allAccountData[i];
        if (account.fitScore > 60 && !account.stage) {
            highFitUnworked.push(account);
        }
    }

    // Admin alerts
    for (var i = 0; i < adminAlerts.length; i++) {
        var alert = adminAlerts[i];
        var alertClass = 'alert-info';
        if (alert.severity === 'critical') alertClass = 'alert-critical';
        else if (alert.severity === 'warning') alertClass = 'alert-warning';

        var alertEl = document.createElement('div');
        alertEl.className = 'alert-item ' + alertClass;
        alertEl.innerHTML =
            '<div class="alert-title">' + escapeHtml(alert.title) + '</div>' +
            '<div class="alert-message">' + escapeHtml(alert.message) + '</div>';
        container.appendChild(alertEl);
    }

    // Stale accounts alert
    if (staleAccounts.length > 0) {
        var staleAlert = document.createElement('div');
        staleAlert.className = 'alert-item alert-warning';
        staleAlert.innerHTML =
            '<div class="alert-title">' + staleAccounts.length + ' Stale Accounts</div>' +
            '<div class="alert-message">No activity in last 30 days. Review engagement strategy.</div>';
        container.appendChild(staleAlert);
    }

    // High-fit unworked alert
    if (highFitUnworked.length > 0) {
        var unworkedAlert = document.createElement('div');
        unworkedAlert.className = 'alert-item alert-critical';
        unworkedAlert.innerHTML =
            '<div class="alert-title">' + highFitUnworked.length + ' High-Fit Unworked</div>' +
            '<div class="alert-message">Fit score > 60 but no deal stage. Prioritize outreach.</div>';
        container.appendChild(unworkedAlert);
    }

    if (container.children.length === 0) {
        container.innerHTML = '<div class="no-data">No active alerts</div>';
    }
}

function renderHeatmap(accounts) {
    var tbody = document.getElementById('heatmap-tbody');
    tbody.innerHTML = '';

    var sorted = accounts.slice();
    sortAccountData(sorted, 'account', 'asc');

    for (var i = 0; i < sorted.length; i++) {
        var acc = sorted[i];
        var fitClass = 'fit-poor';
        if (acc.fitScore >= 80) fitClass = 'fit-excellent';
        else if (acc.fitScore >= 60) fitClass = 'fit-good';
        else if (acc.fitScore >= 40) fitClass = 'fit-fair';

        var lastActStr = acc.lastActivity ? new Date(acc.lastActivity).toLocaleDateString() : 'Never';

        var thirtyDaysAgo = new Date();
        thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
        var heatClass = 'heat-cold';
        if (acc.lastActivity && new Date(acc.lastActivity) < thirtyDaysAgo) {
            heatClass = 'heat-cold';
        } else if (acc.lastActivity && new Date(acc.lastActivity) > thirtyDaysAgo) {
            heatClass = 'heat-warm';
        }

        var row = document.createElement('tr');
        row.innerHTML =
            '<td>' + escapeHtml(acc.name) + '</td>' +
            '<td>' + escapeHtml(acc.owner) + '</td>' +
            '<td>' + escapeHtml(acc.industry) + '</td>' +
            '<td><span class="fit-score ' + fitClass + '">' + acc.fitScore + '</span></td>' +
            '<td>' + escapeHtml(acc.stage || 'None') + '</td>' +
            '<td>$' + formatArrDisplay(acc.arr) + '</td>' +
            '<td>' + lastActStr + '</td>' +
            '<td><span class="heat-indicator ' + heatClass + '"></span>' + (acc.stage ? 'Active' : 'Idle') + '</td>';
        tbody.appendChild(row);
    }
}

function sortAccountData(accounts, column, direction) {
    accounts.sort(function(a, b) {
        var aVal, bVal;

        switch (column) {
            case 'account':
                aVal = a.name.toLowerCase();
                bVal = b.name.toLowerCase();
                break;
            case 'owner':
                aVal = a.owner.toLowerCase();
                bVal = b.owner.toLowerCase();
                break;
            case 'industry':
                aVal = a.industry.toLowerCase();
                bVal = b.industry.toLowerCase();
                break;
            case 'fit':
                aVal = a.fitScore;
                bVal = b.fitScore;
                break;
            case 'stage':
                aVal = a.stage.toLowerCase();
                bVal = b.stage.toLowerCase();
                break;
            case 'arr':
                aVal = a.arr;
                bVal = b.arr;
                break;
            case 'activity':
                aVal = a.lastActivity ? new Date(a.lastActivity).getTime() : 0;
                bVal = b.lastActivity ? new Date(b.lastActivity).getTime() : 0;
                break;
            case 'heat':
                aVal = a.stage ? 1 : 0;
                bVal = b.stage ? 1 : 0;
                break;
            default:
                return 0;
        }

        if (aVal < bVal) return direction === 'asc' ? -1 : 1;
        if (aVal > bVal) return direction === 'asc' ? 1 : -1;
        return 0;
    });
}

function sortTable(column) {
    var direction = 'asc';
    if (currentSortColumn === column && currentSortDirection === 'asc') {
        direction = 'desc';
    }
    currentSortColumn = column;
    currentSortDirection = direction;

    var filtered = filterAccountData();
    sortAccountData(filtered, column, direction);

    var tbody = document.getElementById('heatmap-tbody');
    tbody.innerHTML = '';
    for (var i = 0; i < filtered.length; i++) {
        var acc = filtered[i];
        var fitClass = 'fit-poor';
        if (acc.fitScore >= 80) fitClass = 'fit-excellent';
        else if (acc.fitScore >= 60) fitClass = 'fit-good';
        else if (acc.fitScore >= 40) fitClass = 'fit-fair';

        var lastActStr = acc.lastActivity ? new Date(acc.lastActivity).toLocaleDateString() : 'Never';
        var heatClass = 'heat-cold';
        if (acc.lastActivity) {
            var thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
            if (new Date(acc.lastActivity) < thirtyDaysAgo) {
                heatClass = 'heat-cold';
            } else {
                heatClass = 'heat-warm';
            }
        }

        var row = document.createElement('tr');
        row.innerHTML =
            '<td>' + escapeHtml(acc.name) + '</td>' +
            '<td>' + escapeHtml(acc.owner) + '</td>' +
            '<td>' + escapeHtml(acc.industry) + '</td>' +
            '<td><span class="fit-score ' + fitClass + '">' + acc.fitScore + '</span></td>' +
            '<td>' + escapeHtml(acc.stage || 'None') + '</td>' +
            '<td>$' + formatArrDisplay(acc.arr) + '</td>' +
            '<td>' + lastActStr + '</td>' +
            '<td><span class="heat-indicator ' + heatClass + '"></span>' + (acc.stage ? 'Active' : 'Idle') + '</td>';
        tbody.appendChild(row);
    }
}

function filterHeatmap() {
    sortTable(currentSortColumn);
}

function filterAccountData() {
    var searchTerm = document.getElementById('search-filter').value.toLowerCase();
    var filtered = [];

    for (var i = 0; i < allAccountData.length; i++) {
        var acc = allAccountData[i];
        if (acc.name.toLowerCase().indexOf(searchTerm) > -1 ||
            acc.owner.toLowerCase().indexOf(searchTerm) > -1 ||
            acc.industry.toLowerCase().indexOf(searchTerm) > -1) {
            filtered.push(acc);
        }
    }

    return filtered;
}

function exportHeatmapCSV() {
    var filtered = filterAccountData();
    var csv = 'Account Name,Owner,Industry,Fit Score,Deal Stage,ARR,Last Activity,Heat\n';

    for (var i = 0; i < filtered.length; i++) {
        var acc = filtered[i];
        var lastActStr = acc.lastActivity ? new Date(acc.lastActivity).toLocaleDateString() : 'Never';
        var heat = acc.stage ? 'Active' : 'Idle';
        csv +=
            '"' + acc.name.replace(/"/g, '""') + '",' +
            '"' + acc.owner.replace(/"/g, '""') + '",' +
            '"' + acc.industry.replace(/"/g, '""') + '",' +
            acc.fitScore + ',' +
            '"' + (acc.stage || 'None').replace(/"/g, '""') + '",' +
            acc.arr + ',' +
            lastActStr + ',' +
            heat + '\n';
    }

    var blob = new Blob([csv], {type: 'text/csv'});
    var link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'territory-heatmap.csv';
    link.click();
}

function buildViewAsDropdown() {
    var dropdown = document.getElementById('view-as-dropdown');
    var filterDropdown = document.getElementById('activity-filter');

    for (var i = 0; i < allTeamMembers.length; i++) {
        var member = allTeamMembers[i];
        var option = document.createElement('option');
        option.value = member.username;
        option.textContent = member.name;
        dropdown.appendChild(option);

        var filterOption = document.createElement('option');
        filterOption.value = member.username;
        filterOption.textContent = member.name;
        filterDropdown.appendChild(filterOption);
    }
}

function updateViewAs() {
    var selected = document.getElementById('view-as-dropdown').value;
    var indicator = document.getElementById('view-as-indicator');
    var icBtn = document.getElementById('open-ic-btn');
    var sdrBtn = document.getElementById('open-sdr-btn');

    if (!selected) {
        indicator.style.display = 'none';
        icBtn.style.display = 'none';
        sdrBtn.style.display = 'none';
        sessionStorage.removeItem('nerdio_v3_viewAs');
        return;
    }

    var member = null;
    for (var i = 0; i < allTeamMembers.length; i++) {
        if (allTeamMembers[i].username === selected) {
            member = allTeamMembers[i];
            break;
        }
    }

    if (member) {
        indicator.textContent = 'Viewing as: ' + member.name;
        indicator.style.display = 'block';

        icBtn.style.display = 'inline-block';
        sdrBtn.style.display = member.role === 'sdr' ? 'inline-block' : 'none';

        sessionStorage.setItem('nerdio_v3_viewAs', selected);
    }
}

function openIntelligenceCentre() {
    window.location.href = 'intelligence-centre.html';
}

function openSDREngine() {
    window.location.href = 'sdr-engine.html';
}

function logout() {
    localStorage.removeItem('nerdio_v3_session');
    sessionStorage.removeItem('nerdio_v3_viewAs');
    window.location.href = 'index.html';
}

function escapeHtml(text) {
    var map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
    };
    return text.replace(/[&<>"']/g, function(c) {
        return map[c];
    });
}

function formatArrDisplay(arr) {
    if (arr >= 1000000) {
        return (arr / 1000000).toFixed(1) + 'M';
    } else if (arr >= 1000) {
        return (arr / 1000).toFixed(1) + 'K';
    }
    return arr.toFixed(0);
}
