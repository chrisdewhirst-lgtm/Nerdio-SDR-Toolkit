<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nerdio Sales Command Centre v3</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#042838;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.login-container{width:100%;max-width:420px;padding:32px}
.logo{text-align:center;margin-bottom:36px}
.logo-icon{font-size:48px;margin-bottom:8px}
.logo h1{font-size:22px;font-weight:600;letter-spacing:-.5px}
.logo h1 span{color:#1E9DB8}
.logo p{font-size:12px;color:rgba(255,255,255,.4);margin-top:4px;letter-spacing:1px;text-transform:uppercase;font-weight:500}
.version-badge{display:inline-block;background:linear-gradient(135deg,#1E9DB8,#CDFF4E);color:#042838;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:8px}
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:28px;backdrop-filter:blur(20px)}
.field{margin-bottom:18px}
.field label{display:block;font-size:11px;font-weight:500;color:rgba(255,255,255,.5);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select{width:100%;padding:11px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:#fff;font-family:'Poppins',sans-serif;font-size:13px;outline:none;transition:border .2s}
.field input:focus,.field select:focus{border-color:#1E9DB8}
.field select option{background:#042838;color:#fff}
.btn-login{width:100%;padding:12px;background:linear-gradient(135deg,#1E9DB8,#1E9DB8);border:none;border-radius:10px;color:#fff;font-family:'Poppins',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;margin-top:4px}
.btn-login:hover{background:linear-gradient(135deg,#1E9DB8,#CDFF4E);color:#042838}
.signup-link{text-align:center;margin-top:18px;font-size:12px;color:rgba(255,255,255,.35)}
.signup-link a{color:#1E9DB8;cursor:pointer;text-decoration:none}
.signup-link a:hover{color:#CDFF4E}
.error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444;padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:16px;display:none}
/* Signup form */
.signup-form{display:none}
.signup-form .field-row{display:flex;gap:12px}
.signup-form .field-row .field{flex:1}
.back-link{text-align:center;margin-top:14px;font-size:12px}
.back-link a{color:rgba(255,255,255,.4);cursor:pointer;text-decoration:none}
.back-link a:hover{color:#1E9DB8}
</style>
</head>
<body>
<div class="login-container">
  <div class="logo">
    <div class="logo-icon">🤓</div>
    <h1>nerdio <span>Command Centre</span></h1>
    <p>Account Intelligence Platform</p>
    <div class="version-badge">V3</div>
  </div>

  <!-- LOGIN FORM -->
  <div class="card login-form" id="loginForm">
    <div class="error" id="loginError"></div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="loginUser" placeholder="Enter your username" autocomplete="off">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="Enter your password">
    </div>
    <button class="btn-login" onclick="doLogin()">Sign In</button>
    <div class="signup-link">Don't have an account? <a onclick="showSignup()">Request access</a></div>
  </div>

  <!-- SIGNUP FORM -->
  <div class="card signup-form" id="signupForm">
    <div class="error" id="signupError"></div>
    <div class="field-row">
      <div class="field">
        <label>First Name</label>
        <input type="text" id="signupFirst" placeholder="First name">
      </div>
      <div class="field">
        <label>Last Name</label>
        <input type="text" id="signupLast" placeholder="Last name">
      </div>
    </div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="signupUser" placeholder="Choose a username" autocomplete="off">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="signupPass" placeholder="Choose a password">
    </div>
    <div class="field">
      <label>Role</label>
      <select id="signupRole">
        <option value="sdr">SDR</option>
        <option value="ae" selected>Account Executive</option>
        <option value="manager">Manager</option>
      </select>
    </div>
    <button class="btn-login" onclick="doSignup()">Create Account</button>
    <div class="back-link"><a onclick="showLogin()">← Back to sign in</a></div>
  </div>
</div>

<script>
(function(){
  // ── Check existing session ──
  var session = null;
  try { session = JSON.parse(localStorage.getItem('nerdio_v3_session')); } catch(e){}
  if(session && session.username && session.role){
    routeToRole(session.role);
    return;
  }

  // ── User database ──
  function getUsers(){
    try { return JSON.parse(localStorage.getItem('nerdio_v3_users')) || {}; } catch(e){ return {}; }
  }
  function saveUsers(u){ localStorage.setItem('nerdio_v3_users', JSON.stringify(u)); }

  // Ensure default admin exists
  var users = getUsers();
  if(!users['admin']){
    users['admin'] = { password:'admin', name:'Admin', role:'admin', created: new Date().toISOString() };
    saveUsers(users);
  }

  // ── Login ──
  window.doLogin = function(){
    var username = document.getElementById('loginUser').value.trim().toLowerCase();
    var password = document.getElementById('loginPass').value;
    var errEl = document.getElementById('loginError');
    errEl.style.display = 'none';

    if(!username || !password){ errEl.textContent = 'Please enter username and password.'; errEl.style.display = 'block'; return; }

    var users = getUsers();
    if(!users[username] || users[username].password !== password){
      errEl.textContent = 'Invalid username or password.'; errEl.style.display = 'block'; return;
    }

    var user = users[username];
    localStorage.setItem('nerdio_v3_session', JSON.stringify({
      username: username, name: user.name, role: user.role, loginTime: new Date().toISOString()
    }));
    routeToRole(user.role);
  };

  // ── Signup ──
  window.doSignup = function(){
    var first = document.getElementById('signupFirst').value.trim();
    var last = document.getElementById('signupLast').value.trim();
    var username = document.getElementById('signupUser').value.trim().toLowerCase();
    var password = document.getElementById('signupPass').value;
    var role = document.getElementById('signupRole').value;
    var errEl = document.getElementById('signupError');
    errEl.style.display = 'none';

    if(!first || !username || !password){ errEl.textContent = 'Please fill in all required fields.'; errEl.style.display = 'block'; return; }
    if(username.length < 3){ errEl.textContent = 'Username must be at least 3 characters.'; errEl.style.display = 'block'; return; }
    if(password.length < 3){ errEl.textContent = 'Password must be at least 3 characters.'; errEl.style.display = 'block'; return; }

    var users = getUsers();
    if(users[username]){ errEl.textContent = 'Username already taken.'; errEl.style.display = 'block'; return; }

    users[username] = { password: password, name: first + (last ? ' ' + last : ''), role: role, created: new Date().toISOString() };
    saveUsers(users);

    localStorage.setItem('nerdio_v3_session', JSON.stringify({
      username: username, name: users[username].name, role: role, loginTime: new Date().toISOString()
    }));
    routeToRole(role);
  };

  // ── Navigation ──
  window.showSignup = function(){ document.getElementById('loginForm').style.display = 'none'; document.getElementById('signupForm').style.display = 'block'; };
  window.showLogin = function(){ document.getElementById('signupForm').style.display = 'none'; document.getElementById('loginForm').style.display = 'block'; };

  function routeToRole(role){
    var routes = {
      'admin': 'admin.html',
      'manager': 'manager-portal.html',
      'ae': 'intelligence-centre.html',
      'sdr': 'sdr-engine.html'
    };
    window.location.href = routes[role] || 'intelligence-centre.html';
  }

  // Enter key support
  document.getElementById('loginPass').addEventListener('keydown', function(e){ if(e.key==='Enter') doLogin(); });
  document.getElementById('signupPass').addEventListener('keydown', function(e){ if(e.key==='Enter') doSignup(); });
  document.getElementById('loginUser').focus();
})();
</script>
</body>
</html>
